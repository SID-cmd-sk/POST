name: Process SKS Submission

on:
  push:
    paths:
      - 'submissions/**.zip'   # fires only when a new ZIP lands in submissions/

jobs:
  process:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to move ZIP to processed/ in repo
    concurrency:
      group: sks-submission-processor
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Process new ZIPs and upload to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}   # JSON key of service account
          GDRIVE_FOLDER_ID:   ${{ secrets.GDRIVE_FOLDER_ID }}     # ID of your Drive folder
        run: |
          python scripts/process_and_upload.py

      - name: Commit processed ZIPs back to repo
        run: |
          git config user.name  "SKS Bot"
          git config user.email "bot@sks-scantech.com"
          git add processed/ submissions/
          git diff --cached --quiet || git commit -m "auto: move processed submissions"
          git push
