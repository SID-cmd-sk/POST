name: Receive Submission

on:
  workflow_dispatch:
    inputs:
      submission_id:
        required: true
      submitter_name:
        required: true
      submitter_email:
        required: true
      file_count:
        required: true
      timestamp:
        required: true
      hmac_signature:
        required: true

permissions:
  actions: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate payload
        run: |
          echo "Submission validated"

      - name: Trigger processing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "process-submission.yml",
              ref: "main",
              inputs: context.payload.inputs
            })
